name: laravelproj

services:
  app:
    build: &app-build
      context: ..
      dockerfile: docker/Dockerfile
    image: laravelproj-app:local
    container_name: laravelproj-app
    working_dir: /var/www/html
    ports:
      - "8080:8000"
    volumes: &app-volumes
      - ..:/var/www/html
      - composer-cache:/home/laravel/.composer/cache
    environment: &app-environment
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: saas_platform
      DB_USERNAME: saas
      DB_PASSWORD: saas_secret
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      REDIS_CLIENT: predis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis_secret
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:8000/up"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: >
      sh -c "composer install &&
             if [ ! -f .env ]; then cp .env.example .env && php artisan key:generate --force --no-interaction; fi &&
             php artisan migrate --force &&
             exec php artisan octane:start --server=swoole --host=0.0.0.0 --port=8000"

  queue-worker:
    build: *app-build
    image: laravelproj-app:local
    container_name: laravelproj-queue-worker
    working_dir: /var/www/html
    volumes: *app-volumes
    environment: *app-environment
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    command: php artisan queue:work redis --sleep=1 --tries=3 --timeout=60

  scheduler:
    build: *app-build
    image: laravelproj-app:local
    container_name: laravelproj-scheduler
    working_dir: /var/www/html
    volumes: *app-volumes
    environment: *app-environment
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    command: php artisan schedule:work

  mysql:
    image: mysql:8.0
    container_name: laravelproj-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: saas_platform
      MYSQL_USER: saas
      MYSQL_PASSWORD: saas_secret
      MYSQL_ROOT_PASSWORD: root_secret
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot_secret --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: laravelproj-redis
    ports:
      - "6380:6379"
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "redis_secret"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secret", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
  redis-data:
  composer-cache:
